<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美味上線｜娘家廚房 - 娘家保健生技</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 頂部推廣訊息 -->
    <div class="top-promo-bar">
        首次下載APP送350折價券！
    </div>

    <!-- 頂部導航 -->
    <header class="header">
        <div class="container">
            <div class="header-top">
                <div class="logo">
                    <a href="products.html" title="娘家保健生技">
                        <img src="images/娘家＿網頁＿商標.jpg" alt="娘家保健生技" style="height: 50px;" />
                    </a>
                </div>

                <div class="search-bar">
                    <input
                        type="text"
                        id="search-input"
                        name="search"
                        placeholder="搜尋商品"
                        aria-label="搜尋商品"
                    />
                    <button
                        type="button"
                        id="search-btn"
                        title="搜尋"
                    >
                        🔍
                    </button>
                </div>

                <div class="header-actions">
                    <a href="#" class="icon-link" title="通知">
                        <span class="icon">🔔</span>
                    </a>
                    <a href="#" class="icon-link" title="會員">
                        <span class="icon">👤</span>
                    </a>
                    <a href="cart.html" class="cart-link" title="購物車">
                        <span class="icon">🛒</span>
                        <span class="cart-badge" id="cart-count">0</span>
                    </a>
                </div>
            </div>

            <!-- 導航菜單 -->
            <nav class="main-nav">
                <a href="#" class="nav-link">商品分類</a>
                <a href="#" class="nav-link">母親節送禮</a>
                <a href="#" class="nav-link">TOP熱銷</a>
                <a href="#" class="nav-link">會員專區</a>
                <a href="#" class="nav-link">品牌公告</a>
                <a href="products.html" class="nav-link active">專櫃限時購</a>
            </nav>
        </div>
    </header>

    <!-- 麵包屑 -->
    <div class="container">
        <div class="breadcrumb">
            <a href="products.html">首頁</a>
            <span class="separator">></span>
            <a href="products.html">美味上線</a>
            <span class="separator">></span>
            <span>娘家廚房</span>
        </div>
    </div>

    <!-- Banner -->
    <div class="container">
        <div class="category-banner">
            <img
                src="images/娘家廚房＿首頁.jpeg"
                alt="娘家廚房"
            />
        </div>
    </div>

    <!-- 主要內容 -->
    <main class="main-content">
        <div class="container">
            <!-- 商品分類標題 -->
            <div class="page-header">
                <h1 class="page-title">商品分類</h1>
                <div class="product-count">共 6 項商品</div>
            </div>

            <!-- 工具列：切換視圖與排序 -->
            <div class="toolbar">
                <div class="view-switcher">
                    <button type="button" class="view-btn" data-view="list" title="列表檢視">
                        ☰
                    </button>
                    <button type="button" class="view-btn active" data-view="grid" title="網格檢視">
                        ⊞
                    </button>
                </div>

                <div class="sort-section">
                    <select id="sort-select" name="sort" aria-label="熱賣商品">
                        <option value="sales">熱賣商品</option>
                        <option value="price-low">價格低到高</option>
                        <option value="price-high">價格高到低</option>
                        <option value="newest">最新上架</option>
                    </select>
                </div>
            </div>

            <!-- 商品列表網格 -->
            <div class="product-grid-simple" id="product-grid">
                <!-- 商品卡片會由 JavaScript 動態生成 -->
            </div>
        </div>
    </main>

    <!-- Toast 提示容器 -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>關於娘家</h4>
                    <a href="#">品牌故事</a>
                    <a href="#">門市資訊</a>
                    <a href="#">聯絡我們</a>
                </div>
                <div class="footer-section">
                    <h4>客戶服務</h4>
                    <a href="#">常見問題</a>
                    <a href="#">配送說明</a>
                    <a href="#">退換貨政策</a>
                    <a href="#">聯絡我們</a>
                </div>
                <div class="footer-section">
                    <h4>官方APP</h4>
                    <p>免費專區最超值</p>
                    <div class="app-download">
                        <a href="#"><img src="https://via.placeholder.com/120x40?text=Google+Play" alt="Google Play" /></a>
                        <a href="#"><img src="https://via.placeholder.com/120x40?text=App+Store" alt="App Store" /></a>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2026 by 台灣娘家股份有限公司</p>
                <p>本網站部分架構、建議消費E或促銷價格優惠，本站諮詢建議僅供參考使用本網頁建議使用Google Chrome、Firefox或Edge以上之瀏覽器</p>
            </div>
        </div>
    </footer>

    <script src="js/products-data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/products-simple.js"></script>
</body>
</html>
